<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook Meta-Boost Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; text-align: center; padding: 40px; }
        .meta-panel { max-width: 800px; margin: 0 auto; background: #1c1e21; padding: 40px; border-radius: 20px; border: 2px solid #1877f2; box-shadow: 0 0 30px rgba(24, 119, 242, 0.4); }
        .url-section { margin-bottom: 30px; padding: 20px; background: #242526; border-radius: 10px; }
        .url-input { width: 70%; padding: 10px; border-radius: 5px; border: none; font-size: 1.1em; }
        .boost-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .boost-card { background: #3a3b3c; padding: 20px; border-radius: 15px; transition: 0.3s; }
        .boost-card:hover { background: #4e4f50; transform: scale(1.05); }
        .count { display: block; font-size: 2.5em; font-weight: 800; color: #1877f2; }
        .label { font-size: 1.2em; color: #b0b3b8; text-transform: uppercase; }
        .btn-boost { background: #1877f2; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-boost:hover { background: #166fe5; }
    </style>
</head>
<body>

    <div class="meta-panel">
        <h1>FB Meta-Boost Panel 🇵🇭</h1>
        
        <div class="url-section">
            <p>Target Facebook Page URL:</p>
            <input type="text" id="pageUrl" class="url-input" value="{{ engine.page_url }}">
            <button onclick="updateUrl()" class="btn-boost">Set URL</button>
        </div>

        <div class="boost-grid">
            <div class="boost-card">
                <span class="label">Real Followers</span>
                <span id="followers" class="count">{{ engine.followers }}</span>
                <button onclick="boost('followers')" class="btn-boost">BOOST FOLLOWERS</button>
            </div>
            <div class="boost-card">
                <span class="label">Real Reviews</span>
                <span id="reviews" class="count">{{ engine.reviews }}</span>
                <button onclick="boost('reviews')" class="btn-boost">BOOST REVIEWS</button>
            </div>
            <div class="boost-card">
                <span class="label">Real Shares</span>
                <span id="shares" class="count">{{ engine.shares }}</span>
                <button onclick="boost('shares')" class="btn-boost">BOOST SHARES</button>
            </div>
            <div class="boost-card">
                <span class="label">Real Comments</span>
                <span id="comments" class="count">{{ engine.comments }}</span>
                <button onclick="boost('comments')" class="btn-boost">BOOST COMMENTS</button>
            </div>
        </div>
    </div>

    <script>
    function boost(feature) {
        fetch('/boost/' + feature, { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            document.getElementById(feature).innerText = data.new_count.toLocaleString();
        });
    }

    function updateUrl() {
        const url = document.getElementById('pageUrl').value;
        fetch('/set_url', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url: url}) 
        })
        .then(res => res.json())
        .then(data => alert("Meta-Engine now targeting: " + data.url));
    }
    </script>
</body>
</html>
